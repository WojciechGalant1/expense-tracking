<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance management system</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <style>
        body { background-color: #f8f9fa; }
        .card { margin-top: 50px; box-shadow: 0 0 20px 0 rgba(0, 0, 0, 0.1); }
        h1 { color: #007bff; padding-top: 10px; }
        .form-control { border-radius: 0; }
        .btn-primary { background-color: #007bff; border-color: #007bff; border-radius: 0; }
        .btn-primary:hover { background-color: #0056b3; border-color: #0056b3; }
        .btn-primary:focus { box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.5); }
        .divider { border-top: 1px solid #ced4da; padding-top: 0.5rem; }
    </style>

</head>

<body>
    <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/transactions}">Finance management</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mynavbar">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" th:href="@{/transactions/new}">Add</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/expenses}">Expenses</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/income}">Income</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <span class="nav-link text-light">Logged in: <b sec:authentication="name"></b></span>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="POST" class="d-inline">
                            <button type="submit" class="btn btn-outline-light btn-sm mt-1">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 card">
                <h1 class="text-center p">Edit transaction</h1>
                <div class="card-body">
                    <form th:action="@{/transactions/{id}(id=${transaction.id})}" th:object="${transaction}"
                        method="POST" id="transactionForm" novalidate>
                        <div class="mb-3 row">
                            <div class="col">
                                <label class="form-label">Transaction name</label>
                                <input type="text" name="productName" th:field="*{productName}"
                                    class="form-control" th:classappend="${#fields.hasErrors('productName')} ? 'is-invalid'"
                                    placeholder="Enter transaction name" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('productName')}" th:errors="*{productName}"></div>
                                <div class="invalid-feedback js-error">Transaction name is required.</div>
                            </div>
                            <div class="col">
                                <label class="form-label">Category name</label>
                                <select name="categoryName" th:field="*{categoryName}"
                                    class="form-control form-select" th:classappend="${#fields.hasErrors('categoryName')} ? 'is-invalid'"
                                    required>
                                    <option value="" disabled>-- Select category --</option>
                                    <option value="" class="divider" disabled>Expenses</option>
                                    <option value="Health">Health</option>
                                    <option value="Entertainment">Entertainment</option>
                                    <option value="Bills">Bills</option>
                                    <option value="Subscriptions">Subscriptions</option>
                                    <option value="Home Expenses">Home Expenses</option>
                                    <option value="Education">Education</option>
                                    <option value="Food">Food</option>
                                    <option value="Gifts">Gifts</option>
                                    <option value="Transport">Transport</option>
                                    <option value="Other">Other</option>
                                    <option value="" class="divider" disabled>Income</option>
                                    <option value="Payment">Payment</option>
                                    <option value="Gifts-income">Gifts</option>
                                    <option value="Investments">Investments</option>
                                    <option value="Other-income">Other</option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('categoryName')}" th:errors="*{categoryName}"></div>
                                <div class="invalid-feedback js-error">Category is required.</div>
                            </div>
                        </div>
                        <div class="mb-3 row">
                            <div class="col">
                                <label class="form-label">Transaction amount</label>
                                <input type="number" step="0.01" min="0.01" name="transactionAmount" th:field="*{transactionAmount}"
                                    class="form-control" th:classappend="${#fields.hasErrors('transactionAmount')} ? 'is-invalid'"
                                    placeholder="Enter transaction amount" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('transactionAmount')}" th:errors="*{transactionAmount}"></div>
                                <div class="invalid-feedback js-error">Amount must be greater than 0.</div>
                            </div>
                            <div class="col">
                                <label class="form-label">Transaction type</label>
                                <select name="type" th:field="*{type}"
                                    class="form-control form-select" th:classappend="${#fields.hasErrors('type')} ? 'is-invalid'"
                                    required>
                                    <option value="income">Income</option>
                                    <option value="expense">Expense</option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Transaction time</label>
                            <input type="date" name="transactionTime" th:field="*{transactionTime}"
                                class="form-control" th:classappend="${#fields.hasErrors('transactionTime')} ? 'is-invalid'"
                                th:value="${#temporals.format(transaction.transactionTime, 'yyyy-MM-dd')}" required>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('transactionTime')}" th:errors="*{transactionTime}"></div>
                            <div class="invalid-feedback js-error">Date is required and cannot be in the future.</div>
                        </div>
                        <button type="submit" class="btn btn-primary">Submit</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            var jsErrors = document.querySelectorAll('.js-error');
            jsErrors.forEach(function(el) { el.style.display = 'none'; });

            document.getElementById('transactionForm').addEventListener('submit', function(e) {
                var valid = true;
                jsErrors.forEach(function(el) { el.style.display = 'none'; });

                var productName = document.querySelector('[name="productName"]');
                if (!productName.value.trim()) {
                    productName.classList.add('is-invalid');
                    productName.parentNode.querySelector('.js-error').style.display = 'block';
                    valid = false;
                } else {
                    productName.classList.remove('is-invalid');
                }

                var categoryName = document.querySelector('[name="categoryName"]');
                if (!categoryName.value) {
                    categoryName.classList.add('is-invalid');
                    categoryName.parentNode.querySelector('.js-error').style.display = 'block';
                    valid = false;
                } else {
                    categoryName.classList.remove('is-invalid');
                }

                var amount = document.querySelector('[name="transactionAmount"]');
                if (!amount.value || parseFloat(amount.value) <= 0) {
                    amount.classList.add('is-invalid');
                    amount.parentNode.querySelector('.js-error').style.display = 'block';
                    valid = false;
                } else {
                    amount.classList.remove('is-invalid');
                }

                var date = document.querySelector('[name="transactionTime"]');
                var today = new Date().toISOString().split('T')[0];
                if (!date.value || date.value > today) {
                    date.classList.add('is-invalid');
                    date.parentNode.querySelector('.js-error').style.display = 'block';
                    valid = false;
                } else {
                    date.classList.remove('is-invalid');
                }

                if (!valid) e.preventDefault();
            });
        })();
    </script>
</body>

</html>
