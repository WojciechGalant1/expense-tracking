<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance management system</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <style>
        body {
            background-color: #f8f9fa;
        }

        .card {
            margin-top: 50px;
            box-shadow: 0 0 20px 0 rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #007bff;
            padding-top: 10px;
        }

        .form-control {
            border-radius: 0;
        }

        .btn-primary {
            background-color: #007bff;
            border-color: #007bff;
            border-radius: 0;
        }

        .btn-primary:hover {
            background-color: #0056b3;
            border-color: #0056b3;
        }

        .btn-primary:focus {
            box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.5);
        }

        .divider {
            border-top: 1px solid #ced4da;
            padding-top: 0.5rem;
            font: font-weight-bold;
        }
    </style>

</head>

<body>
    <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/transactions}">Finance management</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mynavbar">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/transactions/new}">Add</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/expenses}">Expenses</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/income}">Income</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 card">
                <h1 class="text-center p">Edit transaction</h1>
                <div class="card-body">
                    <form th:action="@{/transactions/{id}(id=${transaction.id})}" th:object="${transaction}"
                        method="POST">
                        <div class="mb-3 row">
                            <div class="col">
                                <label class="form-label">Transaction name</label>
                                <input type="text" name="productName" th:field="*{productName}" class="form-control "
                                    placeholder="Enter transaction name">
                            </div>
                            <div class="col">
                                <label class="form-label">Category name</label>
                                <select name="categoryName" th:field="*{categoryName}" class="form-control form-select">
                                    <option value="" class="divider" disabled>Expenses</option>
                                    <option value="Health">Health</option>
                                    <option value="Entertainment">Entertainment</option>
                                    <option value="Bills">Bills</option>
                                    <option value="Subscriptions">Subscriptions </option>
                                    <option value="Home Expenses">Home Expenses</option>
                                    <option value="Education">Education</option>
                                    <option value="Food">Food</option>
                                    <option value="Gifts">Gifts</option>
                                    <option value="transport">Transport</option>
                                    <option value="Other">Other</option>
                                    <option value="" class="divider" disabled>Income</option>
                                    <option value="payment">Payment</option>
                                    <option value="gifts">Gifts</option>
                                    <option value="investments">Investments</option>
                                    <option value="other">Other</option>

                                </select>
                            </div>
                        </div>
                        <div class="mb-3 row">
                            <div class="col">
                                <label class="form-label">Transaction amount</label>
                                <input type="number" step="0.5" name="transactionAmount" th:field="*{transactionAmount}"
                                    class="form-control" placeholder="Enter transaction amount">
                            </div>
                            <div class="col">
                                <label class="form-label">Transaction type</label>
                                <select name="type" th:field="*{type}" class="form-control form-select">
                                    <option value="income">Income</option>
                                    <option value="expense">Expense</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Transaction time</label>
                            <input type="date" name="transactionTime" th:field="*{transactionTime}"
                                class="form-control" th:value="${#temporals.format(transaction.transactionTime, 'yyyy-MM-dd')}">
                        </div>
                        <button type="submit" class="btn btn-primary">Submit</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
