<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Finance Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <style>
        body { background-color: #f8f9fa; }
        .register-card {
            margin-top: 60px;
            box-shadow: 0 0 20px 0 rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }
        .register-header {
            background: linear-gradient(135deg, #28a745, #1e7e34);
            color: white;
            padding: 2rem;
            text-align: center;
            border-radius: 10px 10px 0 0;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/transactions}">Finance management</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mynavbar">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/transactions}">Transactions</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/expenses}">Expenses</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/income}">Income</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/login}">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/register}">Register</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5">
                <div class="register-card">
                    <div class="register-header">
                        <h2>Register</h2>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/register}" th:object="${user}" method="POST" id="registerForm" novalidate>
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" id="username" th:field="*{username}" class="form-control"
                                       th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                                       placeholder="Enter username" required minlength="3" maxlength="50">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                                <div class="invalid-feedback js-error">Username must be between 3 and 50 characters.</div>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" id="password" th:field="*{password}" class="form-control"
                                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                       placeholder="Enter password" required minlength="4">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                                <div class="invalid-feedback js-error">Password must be at least 4 characters.</div>
                            </div>
                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label">Confirm password</label>
                                <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control"
                                       th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                                       placeholder="Confirm password" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                                <div class="invalid-feedback js-error" id="confirmError">Passwords do not match.</div>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Register</button>
                        </form>

                        <div class="text-center mt-3">
                            <span>Already have an account? </span>
                            <a th:href="@{/login}">Login here</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const jsErrors = document.querySelectorAll('.js-error');
            jsErrors.forEach(function(el) { el.style.display = 'none'; });

            document.getElementById('registerForm').addEventListener('submit', function(e) {
                let valid = true;
                jsErrors.forEach(function(el) { el.style.display = 'none'; });

                const username = document.getElementById('username');
                const password = document.getElementById('password');
                const confirmPassword = document.getElementById('confirmPassword');

                if (username.value.trim().length < 3 || username.value.trim().length > 50) {
                    username.classList.add('is-invalid');
                    username.nextElementSibling.nextElementSibling.style.display = 'block';
                    valid = false;
                } else {
                    username.classList.remove('is-invalid');
                }

                if (password.value.length < 4) {
                    password.classList.add('is-invalid');
                    password.nextElementSibling.nextElementSibling.style.display = 'block';
                    valid = false;
                } else {
                    password.classList.remove('is-invalid');
                }

                if (password.value !== confirmPassword.value) {
                    confirmPassword.classList.add('is-invalid');
                    document.getElementById('confirmError').style.display = 'block';
                    valid = false;
                } else if (confirmPassword.value.length === 0) {
                    confirmPassword.classList.add('is-invalid');
                    valid = false;
                } else {
                    confirmPassword.classList.remove('is-invalid');
                }

                if (!valid) e.preventDefault();
            });
        })();
    </script>
</body>

</html>
